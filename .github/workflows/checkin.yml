name: Chongbuluo Auto Checkin

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run checkin
        env:
          CHONGBULUO_USERNAME: ${{ secrets.CHONGBULUO_USERNAME }}
          CHONGBULUO_PASSWORD: ${{ secrets.CHONGBULUO_PASSWORD }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          CHECKIN_URL: ${{ secrets.CHECKIN_URL }}
          USERNAME_SELECTOR: ${{ secrets.USERNAME_SELECTOR }}
          PASSWORD_SELECTOR: ${{ secrets.PASSWORD_SELECTOR }}
          SUBMIT_SELECTOR: ${{ secrets.SUBMIT_SELECTOR }}
          CHECKIN_SELECTOR: ${{ secrets.CHECKIN_SELECTOR }}
          HEADLESS: 'true'
        run: python checkin.py
